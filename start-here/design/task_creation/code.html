<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Task Creation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e7e8e9",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-container-highest": "#e1e3e4",
                        "on-surface-variant": "#3d4a3d",
                        "primary-fixed-dim": "#53e076",
                        "tertiary-fixed": "#e5e2e1",
                        "on-tertiary-fixed": "#1c1b1b",
                        "inverse-surface": "#2e3132",
                        "primary-container": "#1db954",
                        "tertiary-container": "#a3a1a1",
                        "on-primary": "#ffffff",
                        "on-background": "#191c1d",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d9dadb",
                        "surface": "#f8f9fa",
                        "secondary-fixed-dim": "#e9c400",
                        "primary": "#006e2d",
                        "on-tertiary-container": "#383838",
                        "surface-tint": "#006e2d",
                        "secondary-container": "#fcd400",
                        "on-secondary-fixed": "#221b00",
                        "on-tertiary-fixed-variant": "#474646",
                        "outline": "#6d7b6c",
                        "on-primary-container": "#004118",
                        "inverse-primary": "#53e076",
                        "surface-container-low": "#f3f4f5",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "surface-container": "#edeeef",
                        "secondary-fixed": "#ffe16d",
                        "surface-variant": "#e1e3e4",
                        "secondary": "#705d00",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "primary-fixed": "#72fe8f",
                        "on-error-container": "#93000a",
                        "outline-variant": "#bccbb9",
                        "background": "#f8f9fa",
                        "on-primary-fixed": "#002108",
                        "tertiary": "#5f5e5e",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#6e5c00",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#544600",
                        "on-primary-fixed-variant": "#005320"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "40px",
                        "base": "8px",
                        "md": "24px",
                        "gutter": "16px",
                        "xl": "64px",
                        "sm": "12px",
                        "margin": "20px"
                    },
                    "fontFamily": {
                        "headline-md": ["Lexend"],
                        "body-md": ["Lexend"],
                        "label-sm": ["Lexend"],
                        "headline-lg": ["Lexend"],
                        "body-lg": ["Lexend"],
                        "label-bold": ["Lexend"],
                        "display": ["Lexend"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1.0", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1.0", "fontWeight": "700" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen font-body-md text-on-surface antialiased">
<!-- Screen Overlay (Simulating modal view for task creation) -->
<div class="fixed inset-0 bg-on-surface/40 z-40 flex flex-col justify-end">
<!-- Bottom Sheet Container -->
<div class="bg-surface w-full rounded-t-xl shadow-[0_-8px_24px_rgba(0,0,0,0.12)] flex flex-col max-h-[795px]">
<!-- Drag Handle -->
<div class="w-full pt-sm pb-xs flex justify-center shrink-0">
<div class="w-[48px] h-[4px] bg-surface-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="px-margin pt-sm pb-md flex justify-between items-center shrink-0">
<h1 class="font-headline-md text-headline-md text-on-surface">New Habit</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-variant active:scale-95">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="px-margin flex flex-col gap-md overflow-y-auto pb-xl">
<!-- Task Name Input -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide opacity-80">Habit Name</label>
<div class="relative">
<input class="w-full h-[56px] px-md rounded-xl bg-surface-container-lowest border-2 border-surface-container text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary-container focus:outline-none focus:ring-0" placeholder="What do you want to build?" type="text"/>
</div>
</div>
<!-- Icon Selection Grid -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide opacity-80">Icon</label>
<div class="grid grid-cols-5 gap-sm">
<!-- Active Icon -->
<button class="aspect-square rounded-xl bg-primary-container text-on-primary flex items-center justify-center shadow-[0_4px_12px_rgba(29,185,84,0.3)] active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</button>
<!-- Inactive Icons -->
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">water_drop</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">book</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">directions_run</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">self_improvement</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">restaurant</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">bed</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">monitor_heart</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">edit_document</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low text-on-surface-variant flex items-center justify-center hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Mandatory/Optional Toggle -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide opacity-80">Priority</label>
<div class="flex bg-surface-container-low rounded-full p-xs">
<button class="flex-1 py-sm flex justify-center items-center rounded-full bg-on-surface text-on-primary font-label-bold text-label-bold shadow-sm">
                            Mandatory
                        </button>
<button class="flex-1 py-sm flex justify-center items-center rounded-full text-on-surface-variant font-label-bold text-label-bold hover:bg-surface-container-highest">
                            Optional
                        </button>
</div>
</div>
<!-- Estimated Time -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide opacity-80">Estimated Time</label>
<div class="flex flex-wrap gap-sm">
<button class="px-md py-[10px] rounded-full border-2 border-surface-container bg-surface-container-lowest font-label-bold text-label-bold text-on-surface-variant hover:bg-surface-container-low active:scale-95">
                            5m
                        </button>
<button class="px-md py-[10px] rounded-full border-2 border-primary-container bg-primary-container/10 font-label-bold text-label-bold text-primary-container shadow-sm active:scale-95">
                            15m
                        </button>
<button class="px-md py-[10px] rounded-full border-2 border-surface-container bg-surface-container-lowest font-label-bold text-label-bold text-on-surface-variant hover:bg-surface-container-low active:scale-95">
                            30m
                        </button>
<button class="px-md py-[10px] rounded-full border-2 border-surface-container bg-surface-container-lowest font-label-bold text-label-bold text-on-surface-variant hover:bg-surface-container-low active:scale-95">
                            1h+
                        </button>
</div>
</div>
</div>
<!-- Sticky Bottom Action -->
<div class="p-margin pt-sm bg-surface/90 backdrop-blur-md border-t border-surface-container sticky bottom-0 shrink-0">
<button class="w-full h-[56px] rounded-xl bg-primary-container text-on-primary font-label-bold text-label-bold flex items-center justify-center shadow-[0_6px_16px_rgba(29,185,84,0.25)] hover:opacity-90 active:scale-95">
                    Save Habit
                </button>
</div>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Manage Sections</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#191c1d",
                    "on-secondary-fixed-variant": "#544600",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#fcd400",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "primary-fixed-dim": "#53e076",
                    "outline": "#6d7b6c",
                    "on-secondary-fixed": "#221b00",
                    "on-secondary-container": "#6e5c00",
                    "on-primary-fixed": "#002108",
                    "on-tertiary-fixed-variant": "#474646",
                    "tertiary-fixed": "#e5e2e1",
                    "secondary-fixed": "#ffe16d",
                    "on-primary-fixed-variant": "#005320",
                    "on-error-container": "#93000a",
                    "tertiary": "#5f5e5e",
                    "tertiary-container": "#a3a1a1",
                    "surface-container-low": "#f3f4f5",
                    "background": "#f8f9fa",
                    "surface-bright": "#f8f9fa",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#383838",
                    "surface-container-highest": "#e1e3e4",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2e3132",
                    "on-tertiary-fixed": "#1c1b1b",
                    "surface": "#f8f9fa",
                    "surface-container-high": "#e7e8e9",
                    "on-surface-variant": "#3d4a3d",
                    "on-secondary": "#ffffff",
                    "primary": "#006e2d",
                    "inverse-on-surface": "#f0f1f2",
                    "on-primary-container": "#004118",
                    "surface-dim": "#d9dadb",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e1e3e4",
                    "on-primary": "#ffffff",
                    "outline-variant": "#bccbb9",
                    "inverse-primary": "#53e076",
                    "primary-fixed": "#72fe8f",
                    "on-background": "#191c1d",
                    "secondary-fixed-dim": "#e9c400",
                    "surface-tint": "#006e2d",
                    "secondary": "#705d00",
                    "error": "#ba1a1a",
                    "surface-container": "#edeeef",
                    "primary-container": "#1db954"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "24px",
                    "xl": "64px",
                    "xs": "4px",
                    "margin": "20px",
                    "base": "8px",
                    "sm": "12px",
                    "lg": "40px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-md": ["Lexend"],
                    "label-sm": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "body-md": ["Lexend"],
                    "display": ["Lexend"],
                    "body-lg": ["Lexend"],
                    "label-bold": ["Lexend"]
            },
            "fontSize": {
                    "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                    "label-sm": ["12px", { "lineHeight": "1.0", "fontWeight": "500" }],
                    "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                    "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                    "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                    "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                    "label-bold": ["14px", { "lineHeight": "1.0", "fontWeight": "700" }]
            }
          }
        }
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pt-safe">
<!-- TopAppBar Shared Component -->
<header class="bg-white dark:bg-[#121212] font-lexend font-bold text-lg sticky top-0 z-50 border-b border-[#EEEEEE] dark:border-[#121212] shadow-[0_4px_12px_rgba(18,18,18,0.04)] flex justify-between items-center w-full px-5 py-4">
<button aria-label="Go back" class="text-[#1DB954] dark:text-[#1DB954] hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-[#1DB954] font-black text-xl tracking-tighter">Manage Sections</h1>
<button aria-label="Add new section" class="text-[#1DB954] dark:text-[#1DB954] hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin py-md pb-[120px] gap-md">
<!-- Islamic Preset Toggle Banner -->
<div class="bg-surface-container-lowest rounded-xl p-gutter border border-surface-container shadow-[0_4px_12px_rgba(18,18,18,0.02)] flex items-center justify-between">
<div class="flex flex-col gap-xs">
<span class="font-label-bold text-label-bold text-on-surface">Islamic Preset</span>
<span class="font-label-sm text-label-sm text-tertiary">Fajr, Dhuhr, Asr, Maghrib, Isha</span>
</div>
<!-- Tactile Toggle Switch (Off state) -->
<button aria-label="Toggle Islamic Preset" class="w-[48px] h-[28px] bg-surface-container-high rounded-full relative transition-colors duration-200 active:scale-95">
<div class="absolute left-[2px] top-[2px] w-[24px] h-[24px] bg-surface-container-lowest rounded-full shadow-sm transition-transform duration-200"></div>
</button>
</div>
<!-- Section List (Draggable Cards) -->
<div class="flex flex-col gap-base">
<!-- Card 1: Morning -->
<div class="bg-surface-container-lowest rounded-xl p-sm shadow-[0_4px_12px_rgba(18,18,18,0.04)] border border-surface-container flex items-center justify-between active:scale-[0.98] transition-transform duration-150">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="routine">routine</span>
</div>
<div class="flex flex-col gap-xs">
<span class="font-label-bold text-label-bold text-on-surface">Morning</span>
<span class="font-label-sm text-label-sm text-tertiary">06:00 AM - 09:00 AM</span>
</div>
</div>
<button aria-label="Reorder Morning section" class="p-2 text-tertiary-container hover:text-on-surface transition-colors cursor-grab active:cursor-grabbing">
<span class="material-symbols-outlined" data-icon="drag_indicator">drag_indicator</span>
</button>
</div>
<!-- Card 2: Deep Work -->
<div class="bg-surface-container-lowest rounded-xl p-sm shadow-[0_4px_12px_rgba(18,18,18,0.04)] border border-surface-container flex items-center justify-between active:scale-[0.98] transition-transform duration-150">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="psychiatry">psychiatry</span>
</div>
<div class="flex flex-col gap-xs">
<span class="font-label-bold text-label-bold text-on-surface">Deep Work</span>
<span class="font-label-sm text-label-sm text-tertiary">09:00 AM - 01:00 PM</span>
</div>
</div>
<button aria-label="Reorder Deep Work section" class="p-2 text-tertiary-container hover:text-on-surface transition-colors cursor-grab active:cursor-grabbing">
<span class="material-symbols-outlined" data-icon="drag_indicator">drag_indicator</span>
</button>
</div>
<!-- Card 3: Afternoon -->
<div class="bg-surface-container-lowest rounded-xl p-sm shadow-[0_4px_12px_rgba(18,18,18,0.04)] border border-surface-container flex items-center justify-between active:scale-[0.98] transition-transform duration-150">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="light_mode">light_mode</span>
</div>
<div class="flex flex-col gap-xs">
<span class="font-label-bold text-label-bold text-on-surface">Afternoon</span>
<span class="font-label-sm text-label-sm text-tertiary">01:00 PM - 05:00 PM</span>
</div>
</div>
<button aria-label="Reorder Afternoon section" class="p-2 text-tertiary-container hover:text-on-surface transition-colors cursor-grab active:cursor-grabbing">
<span class="material-symbols-outlined" data-icon="drag_indicator">drag_indicator</span>
</button>
</div>
<!-- Card 4: Evening -->
<div class="bg-surface-container-lowest rounded-xl p-sm shadow-[0_4px_12px_rgba(18,18,18,0.04)] border border-surface-container flex items-center justify-between active:scale-[0.98] transition-transform duration-150">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
</div>
<div class="flex flex-col gap-xs">
<span class="font-label-bold text-label-bold text-on-surface">Evening</span>
<span class="font-label-sm text-label-sm text-tertiary">05:00 PM - 10:00 PM</span>
</div>
</div>
<button aria-label="Reorder Evening section" class="p-2 text-tertiary-container hover:text-on-surface transition-colors cursor-grab active:cursor-grabbing">
<span class="material-symbols-outlined" data-icon="drag_indicator">drag_indicator</span>
</button>
</div>
</div>
</main>
<!-- Prominent Fixed Add Button (Tactile 'Squishy' Style) -->
<div class="fixed bottom-0 left-0 w-full px-margin pb-safe pt-md bg-gradient-to-t from-background via-background/90 to-transparent pointer-events-none z-40">
<button class="w-full h-[56px] bg-primary-container text-surface-container-lowest font-label-bold text-label-bold rounded-full shadow-[0_8px_24px_rgba(29,185,84,0.25)] flex items-center justify-center gap-2 pointer-events-auto active:scale-[0.95] active:shadow-[0_2px_8px_rgba(29,185,84,0.15)] transition-all duration-200">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
            Add Section
        </button>
</div>
</body></html>

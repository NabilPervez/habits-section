<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-lowest text-on-surface font-body-md min-h-screen relative pb-32">
<!-- TopAppBar -->
<header class="bg-white dark:bg-zinc-950 flex items-center justify-between px-5 h-16 w-full fixed top-0 z-50 shadow-[0_4px_12px_rgba(18,18,18,0.04)]">
<button class="text-zinc-500 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-900 active:scale-95 transition-transform duration-200 p-2 -ml-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-black text-zinc-900 dark:text-white font-lexend font-bold tracking-tight">Location Settings</h1>
<div class="w-10"></div>
</header>
<main class="pt-24 px-margin max-w-lg mx-auto w-full">
<!-- Search Section -->
<div class="relative mb-lg">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-tertiary-container text-2xl" data-icon="search">search</span>
<input class="w-full h-14 pl-12 pr-12 rounded-2xl border-2 border-primary-container bg-surface-lowest text-on-surface font-body-lg text-body-lg focus:outline-none transition-colors placeholder:text-tertiary-container shadow-[0_4px_12px_rgba(18,18,18,0.04)]" placeholder="Search City" type="text" value="San Francisco, CA"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-tertiary-container hover:text-on-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="cancel" data-weight="fill" style="font-variation-settings: 'FILL' 1;">cancel</span>
</button>
</div>
<!-- Quick Action -->
<button class="w-full flex items-center gap-sm p-4 mb-xl rounded-2xl bg-surface-container-lowest border border-surface-container shadow-[0_4px_12px_rgba(18,18,18,0.04)] hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200">
<div class="w-12 h-12 rounded-full bg-primary-container/10 text-primary-container flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="my_location" data-weight="fill" style="font-variation-settings: 'FILL' 1;">my_location</span>
</div>
<div class="text-left flex-1">
<div class="font-label-bold text-on-surface text-body-lg font-bold">Use Current Location</div>
<div class="font-label-sm text-tertiary text-label-sm mt-1">Enable GPS for best results</div>
</div>
<span class="material-symbols-outlined text-tertiary-container" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Popular / Recent List -->
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-md">Recent Searches</h2>
<div class="flex flex-col gap-sm">
<!-- Selected State -->
<button class="w-full flex items-center justify-between p-4 rounded-2xl bg-primary-container/10 border-2 border-primary-container shadow-[0_4px_12px_rgba(18,18,18,0.04)] active:scale-[0.98] transition-transform text-left">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-primary-container text-white flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="location_on" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface font-bold">San Francisco, CA</span>
</div>
<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Unselected State -->
<button class="w-full flex items-center justify-between p-4 rounded-2xl bg-surface-lowest border border-surface-container shadow-[0_4px_12px_rgba(18,18,18,0.04)] active:scale-[0.98] transition-transform text-left hover:border-outline-variant">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-surface-container-low text-tertiary flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="history">history</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Austin, TX</span>
</div>
</button>
<!-- Unselected State -->
<button class="w-full flex items-center justify-between p-4 rounded-2xl bg-surface-lowest border border-surface-container shadow-[0_4px_12px_rgba(18,18,18,0.04)] active:scale-[0.98] transition-transform text-left hover:border-outline-variant">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-surface-container-low text-tertiary flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="history">history</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Seattle, WA</span>
</div>
</button>
<!-- Unselected State -->
<button class="w-full flex items-center justify-between p-4 rounded-2xl bg-surface-lowest border border-surface-container shadow-[0_4px_12px_rgba(18,18,18,0.04)] active:scale-[0.98] transition-transform text-left hover:border-outline-variant">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-surface-container-low text-tertiary flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="history">history</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Chicago, IL</span>
</div>
</button>
</div>
</section>
</main>
<!-- Floating Confirmation Action -->
<div class="fixed bottom-0 left-0 w-full p-margin bg-gradient-to-t from-surface-lowest via-surface-lowest/95 to-transparent pb-[calc(env(safe-area-inset-bottom)+20px)] pt-12 z-40 flex justify-center pointer-events-none">
<div class="max-w-lg w-full pointer-events-auto">
<button class="w-full h-[56px] bg-primary-container text-white font-label-bold text-body-lg font-bold rounded-2xl shadow-[0_8px_16px_rgba(29,185,84,0.24)] active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2">
                Confirm Location
            </button>
</div>
</div>
</body></html>

            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .squishy-btn:active {
            transform: scale(0.95);
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden antialiased">
<!-- TopAppBar (From JSON, suppressed navigation items as this is a transactional screen, but keeping the header structure) -->
<header class="bg-white dark:bg-zinc-950 flex items-center justify-between px-5 h-16 w-full fixed top-0 z-50 border-b border-zinc-100 dark:border-zinc-800 shadow-[0_4px_12px_rgba(18,18,18,0.04)]">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="text-[#1DB954] dark:text-[#1DB954] active:scale-95 transition-transform duration-200 p-2 -ml-2 rounded-full hover:bg-zinc-50 dark:hover:bg-zinc-900">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-lexend font-bold tracking-tight text-xl font-black text-zinc-900 dark:text-white">Location Settings</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-[80px] pb-[40px] px-margin max-w-lg mx-auto w-full relative z-10">
<!-- Graphic Container -->
<div class="relative mb-xl w-full flex justify-center">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none -z-10">
<div class="w-64 h-64 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="w-48 h-48 bg-secondary-container/10 rounded-full blur-2xl absolute translate-x-12 translate-y-12"></div>
</div>
<!-- Central Icon Circle -->
<div class="w-40 h-40 bg-surface-container-lowest rounded-full shadow-[0_8px_32px_rgba(18,18,18,0.08)] flex items-center justify-center relative z-10 border border-zinc-100">
<div class="w-32 h-32 bg-primary-container rounded-full flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-6xl" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<!-- Floating decorative badges -->
<div class="absolute -top-2 -right-2 w-12 h-12 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center shadow-md transform rotate-12">
<span class="material-symbols-outlined text-xl" data-icon="routine">sync</span>
</div>
<div class="absolute bottom-4 -left-4 w-10 h-10 bg-surface-container-highest text-on-surface rounded-full flex items-center justify-center shadow-md transform -rotate-12">
<span class="material-symbols-outlined text-lg" data-icon="sunny">sunny</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center mb-xl w-full px-4">
<h2 class="font-display text-display text-on-surface mb-sm">Find Your Focus</h2>
<p class="font-body-lg text-body-lg text-tertiary-container max-w-md mx-auto">
                We need your location to perfectly time your habits, sync accurate prayer times, and build a routine that flows with your day.
            </p>
</div>
<!-- Feature List (Bento-style mini cards) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm w-full mb-xl">
<div class="bg-surface-container-lowest p-sm rounded-xl border border-zinc-100 shadow-[0_4px_12px_rgba(18,18,18,0.04)] flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container shrink-0">
<span class="material-symbols-outlined" data-icon="mosque" style="font-variation-settings: 'FILL' 1;">mosque</span>
</div>
<div class="flex flex-col text-left">
<span class="font-label-bold text-label-bold text-on-surface">Prayer Sync</span>
<span class="font-label-sm text-label-sm text-tertiary">Local time precision</span>
</div>
</div>
<div class="bg-surface-container-lowest p-sm rounded-xl border border-zinc-100 shadow-[0_4px_12px_rgba(18,18,18,0.04)] flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center text-on-secondary-container shrink-0">
<span class="material-symbols-outlined" data-icon="schedule" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
<div class="flex flex-col text-left">
<span class="font-label-bold text-label-bold text-on-surface">Smart Pacing</span>
<span class="font-label-sm text-label-sm text-tertiary">Adapts to your zone</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col w-full gap-sm mt-auto">
<button class="squishy-btn w-full h-[56px] bg-primary-container text-on-primary rounded-xl font-label-bold text-label-bold flex items-center justify-center shadow-[0_8px_16px_rgba(29,185,84,0.2)] transition-transform duration-200">
                Allow Access
            </button>
<button class="squishy-btn w-full h-[56px] bg-transparent text-tertiary rounded-xl font-label-bold text-label-bold flex items-center justify-center hover:bg-surface-container-low transition-colors duration-200">
                Enter Manually
            </button>
<button class="text-center w-full py-2 text-tertiary-container hover:text-on-surface font-label-sm text-label-sm transition-colors duration-200 mt-xs">
                Not Now
            </button>
</div>

<body class="bg-surface text-on-surface pb-[120px] min-h-screen">

</div>
<h1 class="text-xl font-black text-zinc-900 dark:text-zinc-50">HabitFlow</h1>
<div class="flex items-center">
<span class="material-symbols-outlined hover:bg-zinc-50 dark:hover:bg-zinc-900 active:scale-95 transition-all duration-200 ease-out p-2 rounded-full cursor-pointer">local_fire_department</span>
</div>
</div>
</header>
<main class="max-w-screen-md mx-auto">
<!-- Dashboard Stats Header -->
<section class="px-margin mt-md">
<div class="bg-surface-container-lowest rounded-[16px] p-md shadow-[0_4px_12px_0px_rgba(18,18,18,0.04)] flex items-center justify-between border border-surface-variant/50">
<div class="flex-1 pr-6">
<div class="flex items-baseline justify-between mb-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">Level 5</h2>
<span class="font-label-sm text-label-sm text-tertiary">1,240 / 2,000 XP</span>
</div>
<!-- Progress Bar -->
<div class="h-3 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full w-[62%] shadow-[inset_0_2px_4px_rgba(255,255,255,0.3)]"></div>
</div>
</div>
<div class="flex flex-col items-center justify-center bg-secondary-container/20 px-4 py-3 rounded-xl border border-secondary-container/30">
<span class="material-symbols-outlined text-secondary-fixed-dim text-3xl mb-1" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label-bold text-label-bold text-secondary">12 Day</span>
<span class="font-label-sm text-label-sm text-secondary/80">Streak</span>
</div>
</div>
</section>
<!-- Timeline Main Content -->
<section class="px-margin mt-lg relative">
<!-- Vertical Timeline Line -->
<div class="absolute left-[36px] top-6 bottom-10 w-[2px] bg-surface-variant z-0 rounded-full"></div>
<div class="flex flex-col gap-lg relative z-10">
<!-- Block 1: Active Morning Routine -->
<div class="flex relative">
<!-- Timeline Node -->
<div class="absolute left-[-2px] top-6 w-5 h-5 rounded-full bg-primary-container border-[4px] border-surface shadow-[0_0_0_4px_rgba(29,185,84,0.1)]"></div>
<div class="ml-10 w-full bg-surface-container-lowest rounded-[16px] shadow-[0_8px_24px_rgba(18,18,18,0.08)] border-2 border-primary-container p-md">
<div class="flex justify-between items-start mb-md">
<div>
<span class="inline-block px-3 py-1 bg-on-surface text-surface font-label-sm text-label-sm rounded-full mb-2">07:00 AM</span>
<h3 class="font-headline-md text-headline-md text-on-surface">Morning Routine</h3>
</div>
<span class="material-symbols-outlined text-primary-container text-2xl">sunny</span>
</div>
<!-- Micro-tasks -->
<div class="flex flex-col gap-sm mb-lg">
<label class="flex items-center gap-sm p-3 rounded-lg bg-surface hover:bg-surface-container-low transition-colors cursor-pointer">
<input class="w-5 h-5 rounded text-primary-container border-outline-variant focus:ring-primary-container bg-transparent" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface font-medium">Hydrate (500ml)</span>
</label>
<label class="flex items-center gap-sm p-3 rounded-lg bg-surface hover:bg-surface-container-low transition-colors cursor-pointer">
<input class="w-5 h-5 rounded text-primary-container border-outline-variant focus:ring-primary-container bg-transparent" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface font-medium">10 Min Meditation</span>
</label>
<label class="flex items-center gap-sm p-3 rounded-lg bg-surface hover:bg-surface-container-low transition-colors cursor-pointer">
<input class="w-5 h-5 rounded text-primary-container border-outline-variant focus:ring-primary-container bg-transparent" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface font-medium">Review Daily Goals</span>
</label>
</div>
<!-- Massive Button -->
<button class="w-full h-[64px] bg-primary-container text-on-primary font-label-bold text-label-bold text-lg rounded-[16px] shadow-[0_8px_16px_rgba(29,185,84,0.25)] active:scale-[0.98] transition-transform duration-150 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                            Start Morning Routine
                        </button>
</div>
</div>
<!-- Block 2: Upcoming Work Block -->
<div class="flex relative opacity-60 grayscale-[0.3]">
<!-- Timeline Node -->
<div class="absolute left-[2px] top-6 w-3 h-3 rounded-full bg-surface-variant border-2 border-surface"></div>
<div class="ml-10 w-full bg-surface-container-low rounded-[16px] border border-surface-variant p-md">
<div class="flex justify-between items-start mb-sm">
<div>
<span class="inline-block px-3 py-1 bg-surface-variant text-on-surface-variant font-label-sm text-label-sm rounded-full mb-2">09:00 AM</span>
<h3 class="font-headline-md text-headline-md text-on-surface-variant">Deep Work Block</h3>
</div>
<span class="material-symbols-outlined text-tertiary text-2xl">laptop_mac</span>
</div>
<div class="flex gap-2 mt-sm flex-wrap">

<span class="px-2 py-1 bg-surface text-tertiary font-label-sm text-label-sm rounded-md border border-surface-variant">Inbox Zero</span>
</div>
</div>
</div>

<div class="flex relative opacity-50 grayscale-[0.5]">

<div class="absolute left-[2px] top-6 w-3 h-3 rounded-full bg-surface-variant border-2 border-surface"></div>
<div class="ml-10 w-full bg-surface-container-low rounded-[16px] border border-surface-variant p-md">
<div class="flex justify-between items-start">
<div>
<span class="inline-block px-3 py-1 bg-surface-variant text-on-surface-variant font-label-sm text-label-sm rounded-full mb-2">08:30 PM</span>
<h3 class="font-headline-md text-headline-md text-on-surface-variant">Evening Wind-down</h3>
</div>
<span class="material-symbols-outlined text-tertiary text-2xl">bedtime</span>
</div>
</div>
</div>
</div>
</section>

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<header class="bg-white dark:bg-zinc-950 flex justify-between items-center w-full px-5 h-16 docked full-width top-0 z-50 border-none flat no shadows">
<button class="text-zinc-400 dark:text-zinc-600 hover:bg-zinc-50 dark:hover:bg-zinc-900 active:scale-95 transition-transform duration-150 ease-out p-2 -ml-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="text-xl font-black italic text-emerald-500 dark:text-emerald-400 tracking-tighter">
            HABITRACK
        </div>
<button class="text-zinc-400 dark:text-zinc-600 hover:bg-zinc-50 dark:hover:bg-zinc-900 active:scale-95 transition-transform duration-150 ease-out font-['Lexend'] font-bold tracking-tighter px-3 py-1.5 -mr-3 rounded-full">
            Skip
        </button>
</header>
<main class="flex-1 w-full max-w-md mx-auto px-margin pt-md pb-xl flex flex-col gap-lg">
<div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/4 rounded-full"></div>
</div>
<div class="flex flex-col gap-base">
<h1 class="font-headline-lg text-headline-lg text-on-surface">When does your day start?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">We'll use this to pace your routines.</p>
</div>
<div class="flex flex-col gap-md">
<div class="bg-surface-container-lowest rounded-xl border border-surface-variant p-md shadow-[0_4px_12px_rgba(18,18,18,0.04)] flex flex-col gap-md relative overflow-hidden active:scale-[0.98] transition-transform cursor-pointer group">
<label class="font-label-bold text-label-bold text-on-surface flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="lightbulb" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
                    I wake up at...
                </label>
<div class="flex items-end justify-between">
<div class="font-display text-display text-primary flex items-baseline gap-xs">
<span>07</span><span class="text-primary/40 pb-1">:</span><span>00</span>
</div>
<div class="flex bg-surface-container-low rounded-lg p-xs items-center">
<div class="px-sm py-sm bg-surface-container-lowest shadow-sm rounded-md font-label-bold text-label-bold text-on-surface">AM</div>
<div class="px-sm py-sm text-on-surface-variant font-label-bold text-label-bold">PM</div>
</div>
</div>
</div>
<div class="bg-surface-container-lowest rounded-xl border border-surface-variant p-md shadow-[0_4px_12px_rgba(18,18,18,0.04)] flex flex-col gap-md relative overflow-hidden active:scale-[0.98] transition-transform cursor-pointer group">
<label class="font-label-bold text-label-bold text-on-surface flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px] text-tertiary" data-icon="bedtime" style="font-variation-settings: 'FILL' 1;">bedtime</span>
                    I sleep at...
                </label>
<div class="flex items-end justify-between">
<div class="font-display text-display text-on-surface flex items-baseline gap-xs">
<span>11</span><span class="text-on-surface/20 pb-1">:</span><span>30</span>
</div>
<div class="flex bg-surface-container-low rounded-lg p-xs items-center">
<div class="px-sm py-sm text-on-surface-variant font-label-bold text-label-bold">AM</div>
<div class="px-sm py-sm bg-surface-container-lowest shadow-sm rounded-md font-label-bold text-label-bold text-on-surface">PM</div>
</div>
</div>
</div>
</div>
<div class="mt-auto pt-lg">
<button class="w-full min-h-[56px] bg-primary text-on-primary font-label-bold text-label-bold rounded-xl shadow-[0_8px_16px_rgba(0,110,45,0.2)] active:scale-95 active:shadow-sm transition-all duration-150 flex items-center justify-center tracking-wide">
                Next
            </button>

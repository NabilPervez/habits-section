<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen flex flex-col pt-[64px]">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-white dark:bg-zinc-950 border-b border-zinc-100 dark:border-zinc-800 shadow-sm font-['Lexend'] font-bold tracking-tight text-zinc-900 dark:text-white">
<button aria-label="Close" class="hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors active:scale-95 duration-100 p-2 rounded-full text-[#1DB954] dark:text-[#1DB954]">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="text-xl font-black text-[#1DB954]">FOCUS MODE</h1>
<button aria-label="More options" class="hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors active:scale-95 duration-100 p-2 rounded-full text-[#1DB954] dark:text-[#1DB954]">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col px-margin pb-xl pt-md overflow-y-auto">
<!-- Progress Header -->
<div class="mb-lg w-full max-w-md mx-auto px-4 md:px-0">
<div class="flex justify-between items-end mb-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">Tutorial: Step 1</h2>
<span class="font-label-bold text-label-bold text-outline">33%</span>
</div>
<!-- Progress Visualizer -->
<div class="w-full h-3 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-[#1DB954] rounded-full w-[33%] transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Central Immersive Card -->
<div class="flex-grow flex items-center justify-center w-full max-w-md mx-auto">
<div class="bg-white rounded-[24px] shadow-[0_4px_24px_rgba(18,18,18,0.08)] border border-surface-container-low w-full aspect-[4/5] flex flex-col items-center justify-center p-md relative overflow-hidden">
<!-- Decorative Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 bg-[#1DB954]/10 rounded-full blur-[60px] -z-10"></div>
<!-- Icon Container -->
<div class="w-32 h-32 rounded-full bg-surface-container-lowest shadow-[0_8px_32px_rgba(29,185,84,0.2)] flex items-center justify-center mb-md border-4 border-[#1DB954]/20">
<span class="material-symbols-outlined text-[#1DB954] text-[64px]" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<!-- Task Details -->
<h3 class="font-display text-display text-on-surface text-center mb-sm">Drink Water</h3>
<p class="font-body-lg text-body-lg text-outline text-center max-w-[280px]">Stay hydrated to keep your energy levels high.</p>
<!-- Swipe Hint -->
<div class="absolute bottom-md left-0 w-full flex justify-center items-center gap-xs opacity-50">
<span class="material-symbols-outlined text-outline text-[16px]" data-icon="chevron_left">chevron_left</span>
<span class="font-label-sm text-label-sm text-outline tracking-wider uppercase">Swipe to complete</span>
<span class="material-symbols-outlined text-outline text-[16px]" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</div>
<!-- Bottom Action Area -->
<div class="mt-lg w-full max-w-md mx-auto px-4 md:px-0 flex flex-col gap-sm">
<button class="w-full min-h-[64px] bg-[#1DB954] text-white font-headline-md text-headline-md rounded-xl shadow-[0_8px_16px_rgba(29,185,84,0.3)] active:scale-95 active:shadow-[0_4px_8px_rgba(29,185,84,0.4)] transition-all duration-200 ease-out flex items-center justify-center gap-sm">
                DONE
                <span class="material-symbols-outlined text-[28px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="w-full min-h-[48px] bg-transparent text-outline font-label-bold text-label-bold rounded-xl hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
                Skip for now
            </button>
</div>

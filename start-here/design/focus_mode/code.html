<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>HabitFlow - Focus Mode</title>
<!-- Google Fonts & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Design System Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#383838",
                    "surface": "#f8f9fa",
                    "surface-bright": "#f8f9fa",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f8f9fa",
                    "inverse-on-surface": "#f0f1f2",
                    "primary-fixed-dim": "#53e076",
                    "inverse-surface": "#2e3132",
                    "inverse-primary": "#53e076",
                    "surface-dim": "#d9dadb",
                    "on-error": "#ffffff",
                    "outline-variant": "#bccbb9",
                    "on-background": "#191c1d",
                    "surface-container-high": "#e7e8e9",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e1e3e4",
                    "surface-container": "#edeeef",
                    "secondary-container": "#fcd400",
                    "primary": "#006e2d",
                    "on-tertiary-fixed": "#1c1b1b",
                    "on-tertiary": "#ffffff",
                    "outline": "#6d7b6c",
                    "surface-variant": "#e1e3e4",
                    "on-primary-fixed": "#002108",
                    "tertiary-fixed": "#e5e2e1",
                    "secondary-fixed": "#ffe16d",
                    "on-tertiary-fixed-variant": "#474646",
                    "secondary": "#705d00",
                    "on-surface-variant": "#3d4a3d",
                    "tertiary": "#5f5e5e",
                    "surface-container-low": "#f3f4f5",
                    "primary-container": "#1db954",
                    "secondary-fixed-dim": "#e9c400",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#a3a1a1",
                    "surface-tint": "#006e2d",
                    "on-primary-fixed-variant": "#005320",
                    "on-primary-container": "#004118",
                    "on-secondary-fixed": "#221b00",
                    "on-secondary-container": "#6e5c00",
                    "on-secondary": "#ffffff",
                    "on-surface": "#191c1d",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "primary-fixed": "#72fe8f",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed-variant": "#544600"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "margin": "20px",
                    "xl": "64px",
                    "lg": "40px",
                    "md": "24px",
                    "base": "8px",
                    "xs": "4px",
                    "sm": "12px"
            },
            "fontFamily": {
                    "label-sm": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "headline-md": ["Lexend"],
                    "body-lg": ["Lexend"],
                    "body-md": ["Lexend"],
                    "display": ["Lexend"],
                    "label-bold": ["Lexend"]
            },
            "fontSize": {
                    "label-sm": ["12px", { "lineHeight": "1.0", "fontWeight": "500" }],
                    "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                    "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                    "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                    "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                    "label-bold": ["14px", { "lineHeight": "1.0", "fontWeight": "700" }]
            }
          }
        }
      }
    </script>
<style>
        /* Prevent bounce scroll on iOS for true full-screen app feel */
        body { overscroll-behavior-y: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<!-- Suppressing Navigation Shells: Page intent is Task-Focused/Linear Focus Mode -->
<body class="bg-background min-h-screen w-full flex flex-col font-body-md text-on-surface antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary">
<!-- TOP: Progress Header -->
<header class="px-margin pt-margin pb-base flex flex-col gap-base shrink-0 safe-area-pt">
<div class="flex items-center justify-between w-full">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-[0_2px_8px_rgba(0,0,0,0.04)] text-on-surface-variant active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 600;">close</span>
</button>
<span class="font-label-bold text-label-bold text-tertiary uppercase tracking-[0.1em]">Step 4 of 12</span>
<div class="w-12 h-12"></div> <!-- Balancing spacer -->
</div>
<div class="w-full max-w-md mx-auto mt-sm h-4 bg-surface-container-high rounded-full overflow-hidden shadow-inner">
<div class="h-full bg-primary-container rounded-full w-[33%] shadow-[0_0_12px_rgba(29,185,84,0.4)] transition-all duration-1000 ease-out relative overflow-hidden">
<!-- Subtle shimmer effect on progress -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full animate-[shimmer_2s_infinite]"></div>
</div>
</div>
</header>
<!-- CENTER: Massive Immersive Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin py-margin relative z-10 w-full max-w-screen-md mx-auto">
<!-- Floating Habit Card -->
<div class="bg-surface-container-lowest rounded-[32px] shadow-[0_16px_40px_-12px_rgba(18,18,18,0.08)] border border-surface-container-highest w-full max-w-[360px] aspect-[4/5] flex flex-col items-center justify-center gap-xl p-margin relative overflow-hidden">
<!-- Ambient top glow -->
<div class="absolute top-0 inset-x-0 h-1/2 bg-gradient-to-b from-primary-container/10 to-transparent pointer-events-none"></div>
<div class="w-40 h-40 rounded-full bg-primary-container/10 flex items-center justify-center shadow-[inset_0_4px_16px_rgba(0,0,0,0.04)] relative z-10 group">
<span class="material-symbols-outlined text-[80px] text-primary-container drop-shadow-md transition-transform duration-300 group-hover:scale-110" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<h1 class="font-display text-display text-on-surface text-center leading-tight relative z-10 tracking-tight">
                Brush<br/>Teeth
            </h1>
</div>
</main>
<!-- BOTTOM: Giant Action Area -->
<section class="h-[265px] min-h-[240px] w-full bg-surface-container-lowest shadow-[0_-16px_48px_rgba(0,0,0,0.06)] rounded-t-[40px] flex flex-col items-center justify-center px-margin py-lg gap-gutter z-20 border-t border-surface-container-highest shrink-0 relative overflow-hidden safe-area-pb">
<!-- Giant High-Contrast Button -->
<button class="w-full max-w-md flex-1 bg-primary-container rounded-[28px] shadow-[0_8px_32px_rgba(29,185,84,0.35)] active:scale-[0.96] transition-all duration-150 ease-out flex items-center justify-center gap-base group relative overflow-hidden">
<!-- Active press flash overlay -->
<div class="absolute inset-0 bg-white opacity-0 group-active:opacity-20 transition-opacity duration-150"></div>
<span class="font-headline-lg text-headline-lg text-on-primary font-bold tracking-wide z-10 group-active:scale-105 transition-transform duration-150">DONE</span>
<span class="material-symbols-outlined text-on-primary text-[40px] z-10 group-active:scale-105 transition-transform duration-150" style="font-variation-settings: 'FILL' 1, 'wght' 700;">check_circle</span>
</button>
<!-- Subtle Secondary Action -->
<button class="font-label-bold text-label-bold text-tertiary uppercase tracking-widest py-base px-lg active:scale-95 active:text-on-surface transition-all duration-150">
            Skip for now
        </button>
</section>
</body></html>
